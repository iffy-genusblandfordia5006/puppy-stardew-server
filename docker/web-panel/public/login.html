<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puppy Stardew - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1923;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: #1a2736;
      border: 1px solid #2d3f52;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      margin: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .emoji { font-size: 48px; }
    .login-logo h1 {
      font-size: 22px;
      margin-top: 12px;
      color: #4ade80;
    }
    .login-logo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #243447;
      border: 1px solid #2d3f52;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #4ade80;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #4ade80;
      border: none;
      border-radius: 8px;
      color: #0f1923;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover { background: #22c55e; }
    .login-btn:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <div class="emoji">🐶</div>
      <h1>Puppy Stardew Server</h1>
      <p data-i18n="login.subtitle">Server Management Panel</p>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label data-i18n="login.password">Password</label>
        <input type="password" id="password" placeholder="Enter panel password" autofocus required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn" data-i18n="login.button">Login</button>
    </form>
  </div>

  <script>
    // Check if already logged in
    const token = localStorage.getItem('panel_token');
    if (token) {
      fetch('/api/auth/verify', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(r => {
        if (r.ok) window.location.href = '/';
      });
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Logging in...';
      errorEl.classList.remove('show');

      try {
        const resp = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });

        const data = await resp.json();

        if (resp.ok) {
          localStorage.setItem('panel_token', data.token);
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          if (data.attemptsRemaining !== undefined) {
            errorEl.textContent += ` (${data.attemptsRemaining} attempts remaining)`;
          }
          errorEl.classList.add('show');
        }
      } catch (err) {
        errorEl.textContent = 'Connection failed. Is the server running?';
        errorEl.classList.add('show');
      }

      btn.disabled = false;
      btn.textContent = 'Login';
    }
  </script>
</body>
</html>
